<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#7d9b76" />
    <title>You're offline — Smileys app</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; font-family: Inter, system-ui, -apple-system, sans-serif; }
      body {
        background: #f5f0e8;
        color: #2d2d2d;
        display: flex; align-items: center; justify-content: center;
        padding: 24px;
      }
      .card {
        max-width: 420px; width: 100%;
        background: #fff; border-radius: 16px; padding: 32px 28px;
        box-shadow: 0 6px 24px rgba(0,0,0,.08);
        text-align: center;
      }
      .icon {
        width: 56px; height: 56px; margin: 0 auto 16px;
        border-radius: 14px; background: #7d9b76; color: #fff;
        display: flex; align-items: center; justify-content: center;
        font-size: 28px; font-weight: 700;
      }
      h1 { font-size: 22px; margin: 0 0 8px; font-weight: 600; }
      p { color: #666; font-size: 14px; line-height: 1.5; margin: 0 0 20px; }
      button {
        background: #7d9b76; color: #fff; border: 0; border-radius: 10px;
        padding: 12px 20px; font-size: 14px; font-weight: 500; cursor: pointer;
        width: 100%;
      }
      button:hover { background: #6b8865; }
      .hint { font-size: 12px; color: #999; margin-top: 16px; }
      @media (prefers-color-scheme: dark) {
        body { background: #1a1a1a; color: #eee; }
        .card { background: #2d2d2d; }
        p { color: #aaa; }
        .hint { color: #777; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">S</div>
      <h1>You're offline</h1>
      <p>Smileys app can't reach the network right now. Some recently viewed data may still be available. Reconnect to sync your latest changes.</p>
      <button onclick="location.reload()">Try again</button>
      <div class="hint">Cached pages will continue to work while offline.</div>
    </div>
    <script>
      // Auto-retry when we come back online
      window.addEventListener("online", () => location.reload());
    </script>
  </body>
</html>
