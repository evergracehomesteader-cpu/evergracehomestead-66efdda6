<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#7d9b76" />
    <title>Offline — Smileys app</title>
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: #f5f0e8;
        color: #1f2a1d;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        max-width: 28rem;
        width: 100%;
        background: #fff;
        border: 1px solid rgba(125, 155, 118, 0.25);
        border-radius: 1rem;
        padding: 2rem;
        text-align: center;
        box-shadow: 0 10px 30px -12px rgba(31, 42, 29, 0.2);
      }
      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 3.5rem;
        height: 3.5rem;
        border-radius: 1rem;
        background: #7d9b76;
        color: #fff;
        margin-bottom: 1rem;
        font-size: 1.5rem;
      }
      h1 { font-size: 1.5rem; margin: 0 0 0.5rem; font-weight: 600; }
      p { color: #5a6b56; margin: 0 0 1.25rem; line-height: 1.5; }
      button {
        appearance: none;
        border: 0;
        background: #7d9b76;
        color: #fff;
        font: inherit;
        font-weight: 600;
        padding: 0.65rem 1.25rem;
        border-radius: 0.6rem;
        cursor: pointer;
      }
      button:hover { background: #6b8865; }
      .meta { margin-top: 1rem; font-size: 0.75rem; color: #8b9787; }
    </style>
  </head>
  <body>
    <main class="card" role="main">
      <div class="badge" aria-hidden="true">🌱</div>
      <h1>You're offline</h1>
      <p>
        Smileys app couldn't reach the network. Anything you already loaded
        is still available — try again when your connection is back.
      </p>
      <button type="button" onclick="location.reload()">Try again</button>
      <div class="meta">Smileys app · works offline once installed</div>
    </main>
    <script>
      // Auto-retry the moment the browser reports we're online again.
      window.addEventListener("online", () => location.reload());
    </script>
  </body>
</html>
